<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Prompt Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
<h2>Prompt Hub</h2>

<button onclick="showTab('home')">🏠 الرئيسية</button>
<button onclick="showTab('prompts')">📝 البرومبتات</button>
<button onclick="showTab('categories')">📂 الأقسام</button>
<button onclick="showTab('notifications')">🔔 الإشعارات</button>
<button onclick="showTab('settings')">⚙️ الإعدادات</button>

</div>

<div class="main">

<!-- HOME -->
<div id="home" class="tab active">
<h2>الرئيسية</h2>
<div id="homeGrid" class="grid"></div>
</div>

<!-- PROMPTS -->
<div id="prompts" class="tab hidden">

<div class="topbar">
<h2>البرومبتات</h2>
<button class="btn" onclick="toggleForm()">+ إضافة برومبت</button>
</div>

<input id="search" placeholder="🔍 بحث..." oninput="render()">

<div id="form" class="form hidden">

<input id="title" placeholder="عنوان البرومبت">
<input id="image" placeholder="رابط الصورة">

<select id="category">
<option>ترند</option>
<option>سينمائي</option>
<option>جيبلي</option>
</select>

<textarea id="prompt" placeholder="البرومبت"></textarea>
<textarea id="desc" placeholder="الشرح"></textarea>

<select id="platform">
<option>YouTube</option>
<option>TikTok</option>
<option>Telegram</option>
<option>Facebook</option>
</select>

<input id="videoLink" placeholder="رابط الفيديو">

<label>
<input type="checkbox" id="showHome"> إظهار في الرئيسية
</label>

<button onclick="addPrompt()" class="btn full">حفظ</button>

</div>

<div id="list" class="list"></div>

</div>

<!-- CATEGORIES -->
<div id="categories" class="tab hidden">
<h2>الأقسام</h2>

<input id="catName" placeholder="اسم القسم">
<button class="btn" onclick="addCategory()">إضافة</button>

<div id="catList"></div>
</div>

<!-- NOTIFICATIONS -->
<div id="notifications" class="tab hidden">
<h2>الإشعارات</h2>

<input placeholder="عنوان الإشعار">
<textarea placeholder="نص الإشعار"></textarea>
<button class="btn full">إرسال</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="tab hidden">
<h2>الإعدادات</h2>

<input placeholder="اسم التطبيق">
<input placeholder="رابط الشعار">
<input placeholder="رابط سياسة الخصوصية">
<input placeholder="رابط حذف الحساب">
</div>

</div>

<script src="app.js"></script>
</body>
</html>
