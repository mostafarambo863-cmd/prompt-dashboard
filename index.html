<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Prompt Dashboard Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
<h2>Prompt Hub</h2>

<button onclick="showTab('home')">🏠 الرئيسية</button>
<button onclick="showTab('prompts')">📝 البرومبتات</button>
<button onclick="showTab('categories')">📂 الأقسام</button>
<button onclick="showTab('notifications')">🔔 الإشعارات</button>
<button onclick="showTab('settings')">⚙️ الإعدادات</button>

</div>

<div class="main">

<!-- HOME -->
<div id="home" class="tab active">
<h1>الرئيسية</h1>
<div id="homeGrid" class="grid"></div>
</div>

<!-- PROMPTS -->
<div id="prompts" class="tab hidden">

<div class="header">
<h1>البرومبتات</h1>
<button class="btn" onclick="toggleForm()">+ إضافة برومبت</button>
</div>

<input id="search" placeholder="🔍 بحث عن برومبت..." oninput="render()">

<div id="form" class="form hidden">

<input id="title" placeholder="عنوان البرومبت">
<input id="image" placeholder="رابط الصورة">

<select id="category">
<option>ترند</option>
<option>سينمائي</option>
<option>جيبلي</option>
</select>

<textarea id="prompt" placeholder="البرومبت"></textarea>
<textarea id="desc" placeholder="الشرح"></textarea>

<select id="platform">
<option>YouTube</option>
<option>TikTok</option>
<option>Telegram</option>
<option>Facebook</option>
</select>

<input id="videoLink" placeholder="رابط الفيديو">

<label>
<input type="checkbox" id="showHome">
إظهار في الرئيسية
</label>

<button class="btn full" onclick="addPrompt()">حفظ البرومبت</button>

</div>

<div id="list"></div>

</div>

<!-- CATEGORIES -->
<div id="categories" class="tab hidden">
<h1>الأقسام</h1>

<div class="form">
<input id="catName" placeholder="اسم القسم">
<button class="btn full" onclick="addCategory()">إضافة قسم</button>
</div>

<div id="catList"></div>
</div>

<!-- OTHERS -->
<div id="notifications" class="tab hidden">
<h1>الإشعارات</h1>
<div class="card">واجهة فقط حالياً</div>
</div>

<div id="settings" class="tab hidden">
<h1>الإعدادات</h1>
<div class="card">واجهة فقط حالياً</div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
