<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">
<h2>Prompt Hub</h2>

<nav>
<button onclick="show('home')">الرئيسية</button>
<button onclick="show('prompts')">البرومبتات</button>
<button onclick="show('categories')">الأقسام</button>
<button onclick="show('notifications')">الإشعارات</button>
<button onclick="show('settings')">الإعدادات</button>
</nav>

</aside>

<!-- MAIN -->
<main class="main">

<!-- HOME -->
<section id="home" class="page active">
<h1>الرئيسية</h1>
<div id="homeGrid" class="grid"></div>
</section>

<!-- PROMPTS -->
<section id="prompts" class="page">

<div class="header">
<h1>البرومبتات</h1>
<button onclick="toggleForm()">+ إضافة</button>
</div>

<div id="form" class="form hidden">
<input id="title" placeholder="العنوان">
<input id="image" placeholder="الصورة">
<textarea id="prompt" placeholder="البرومبت"></textarea>
<button onclick="add()">حفظ</button>
</div>

<div id="list"></div>

</section>

<!-- CATEGORIES -->
<section id="categories" class="page">
<h1>الأقسام</h1>

<div class="form">
<input id="cat" placeholder="اسم القسم">
<button onclick="addCat()">إضافة</button>
</div>

<div id="catList"></div>
</section>

<!-- NOTIFICATIONS -->
<section id="notifications" class="page">
<h1>الإشعارات</h1>

<div class="form">
<input placeholder="عنوان الإشعار">
<textarea placeholder="نص الإشعار"></textarea>
<button>إرسال</button>
</div>

</section>

<!-- SETTINGS -->
<section id="settings" class="page">
<h1>الإعدادات</h1>
<div class="card">Settings UI</div>
</section>

</main>

</div>

<script src="app.js"></script>
</body>
</html>
