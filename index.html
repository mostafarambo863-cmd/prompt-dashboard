<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Hub Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Prompt Hub</h2>
            <button class="toggle-btn" onclick="toggleSidebar()">✕</button>
        </div>
        
        <button onclick="showTab('home')" class="nav-btn active">🏠 الرئيسية</button>
        <button onclick="showTab('prompts')" class="nav-btn">📝 البرومبتات</button>
        <button onclick="showTab('categories')" class="nav-btn">📂 الأقسام</button>
        <button onclick="showTab('notifications')" class="nav-btn">🔔 الإشعارات</button>
        <button onclick="showTab('settings')" class="nav-btn">⚙️ الإعدادات</button>

        <div class="sidebar-footer">
            <button onclick="toggleTheme()" id="theme-btn">🌙</button>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <!-- HOME -->
        <div id="home" class="tab active">
            <h1 class="page-title">الرئيسية</h1>
            <div id="stats" class="stats-grid"></div>
            <h2 class="section-title">البرومبتات المميزة</h2>
            <div class="grid" id="homeGrid"></div>
        </div>

        <!-- PROMPTS -->
        <div id="prompts" class="tab hidden">
            <div class="header">
                <h1 class="page-title">البرومبتات</h1>
                <button class="btn primary" onclick="toggleForm()">+ إضافة برومبت</button>
            </div>
            
            <input type="text" id="search" placeholder="🔍 ابحث عن برومبت..." oninput="render()">

            <div id="form" class="form hidden">
                <h3>إضافة برومبت جديد</h3>
                <input id="title" placeholder="عنوان البرومبت">
                <input id="image" placeholder="رابط الصورة">
                <select id="category">
                    <option value="ترند">ترند</option>
                    <option value="سينمائي">سينمائي</option>
                    <option value="جيبلي">جيبلي</option>
                    <option value="أنمي">أنمي</option>
                    <option value="واقعي">واقعي</option>
                </select>
                <textarea id="prompt" rows="5" placeholder="البرومبت هنا..."></textarea>
                <textarea id="desc" rows="2" placeholder="وصف مختصر"></textarea>
                <select id="platform">
                    <option value="YouTube">YouTube</option>
                    <option value="TikTok">TikTok</option>
                    <option value="Instagram">Instagram</option>
                </select>
                <input id="videoLink" placeholder="رابط الفيديو (اختياري)">
                <label><input type="checkbox" id="showHome"> إظهار في الرئيسية</label>
                
                <div class="form-buttons">
                    <button class="btn secondary" onclick="toggleForm()">إلغاء</button>
                    <button class="btn primary" onclick="addPrompt()">حفظ</button>
                </div>
            </div>

            <div id="list" class="grid"></div>
        </div>

        <!-- CATEGORIES -->
        <div id="categories" class="tab hidden">
            <h1 class="page-title">الأقسام</h1>
            <div class="form">
                <input id="catName" placeholder="اسم القسم">
                <button class="btn primary" onclick="addCategory()">إضافة</button>
            </div>
            <div id="catList"></div>
        </div>

        <div id="notifications" class="tab hidden">
            <h1 class="page-title">الإشعارات</h1>
            <div class="card">قريباً...</div>
        </div>
        <div id="settings" class="tab hidden">
            <h1 class="page-title">الإعدادات</h1>
            <div class="card">قريباً...</div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
